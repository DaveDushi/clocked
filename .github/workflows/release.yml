name: release

# Builds distributable artifacts on a version tag (v*). macOS is signed +
# notarized on an Apple runner (the only place codesign/notarytool run); Windows
# builds the Inno Setup installer. Both upload to the GitHub Release for the tag.
#
# Required repository secrets for the macOS job (leave unset to get an unsigned
# build that will fail notarization/Gatekeeper — fine for a dry run):
#   MACOS_CERT_P12_BASE64  base64 of the Developer ID Application .p12
#   MACOS_CERT_PASSWORD    password for that .p12
#   MACOS_DEVELOPER_ID     "Developer ID Application: Name (TEAMID)"
#   NOTARY_APPLE_ID        Apple ID email for notarization
#   NOTARY_TEAM_ID         Apple Developer Team ID
#   NOTARY_PASSWORD        app-specific password for the Apple ID

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Import signing certificate
        if: env.MACOS_CERT_P12_BASE64 != ''
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          echo "$MACOS_CERT_P12_BASE64" | base64 -d > cert.p12
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f cert.p12

      - name: Store notarization credentials
        if: env.NOTARY_APPLE_ID != ''
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials clocked-notary \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build, sign, notarize
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          NOTARY_PROFILE: clocked-notary
        run: bash packaging/macos/build-app.sh

      - name: Upload macOS artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/clocked-*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: ./build-installer.ps1
      - name: Upload Windows artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/clocked-setup-*.exe
